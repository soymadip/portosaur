name: Publish New Version to Regestries
run-name: publish V${{ github.ref_name }} to GH, npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  verify:
    name: Verify Changes
    runs-on: ubuntu-latest
    env:
      GIT_AUTHOR_NAME: "soymadip"
      GIT_COMMITTER_NAME: "Soumadip Das"
      GIT_AUTHOR_EMAIL: "ci@portosaur.org"
      GIT_COMMITTER_EMAIL: "ci@portosaur.org"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |-
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure Git
        run: |
          git config --global user.email "ci@portosaur.org"
          git config --global user.name "Portosaur CI"

      - name: Run Smoke Test
        run: bun run test:smoke

  github-release:
    name: Create GitHub Release
    needs: verify
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Mise
        uses: jdx/mise-action@v4

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view ${{ github.ref_name }} > /dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists, skipping."
            exit 0
          fi

          echo "Generating changelog for ${{ github.ref_name }} using mise..."
          mise run -q changelog-latest ${{ github.ref_name }} > release_notes.md

          # Check if version starts with 0 to mark as prerelease
          latest_ver="${{ github.ref_name }}"
          latest_ver="${latest_ver#v}"

          PRERELEASE_FLAG=""
          if [[ "$latest_ver" == 0* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          echo "Creating GitHub release for tag ${{ github.ref_name }}..."
          gh release create ${{ github.ref_name }} -F release_notes.md $PRERELEASE_FLAG

  publish-npm:
    name: Publish to NPM
    needs: verify
    runs-on: ubuntu-latest
    environment: npm
    env:
      GIT_AUTHOR_NAME: "Soumadip Das"
      GIT_COMMITTER_NAME: "Soumadip Das"
      GIT_AUTHOR_EMAIL: "CI@portosaur.org"
      GIT_COMMITTER_EMAIL: "CI@portosaur.org"

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |-
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish all Packages
        run: |-
          # Function to replace workspace:* with actual version
          replace_workspace_deps() {
            local pkg_json="$1"
            local version="$2"

            # Replace workspace:* with actual version
            sed -i "s/workspace:\*/^${version}/g" "$pkg_json"
          }

          # publish loop for scoped packages
          for dir in packages/*; do
            if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
              pkg_name=$(jq -r .name "$dir/package.json")
              pkg_version=$(jq -r .version "$dir/package.json")

              echo "Checking $pkg_name@$pkg_version..."

              # Check if version exists on npm
              if npm view "$pkg_name@$pkg_version" > /dev/null 2>&1; then
                echo "✓ $pkg_name@$pkg_version already published"
              else
                echo "Publishing $pkg_name@$pkg_version..."

                # Replace workspace:* with actual version
                replace_workspace_deps "$dir/package.json" "$pkg_version"

                cd $dir
                npm publish --access public

                if [ $? -ne 0 ]; then
                  echo "✗ Failed to publish $pkg_name@$pkg_version"
                  exit 1
                fi

                cd ../..

                # Restore workspace:* (git will revert on next run)
                git checkout "$dir/package.json"
              fi
            fi
          done
